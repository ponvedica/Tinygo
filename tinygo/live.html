<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TinyGo — Live</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:      #0d1117;
      --surface: #161b22;
      --border:  #30363d;
      --accent:  #58a6ff;
      --green:   #3fb950;
      --warn:    #f78166;
      --purple:  #d2a8ff;
      --yellow:  #e3b341;
      --text:    #e6edf3;
      --muted:   #8b949e;
      --dim:     #21262d;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── TOP BAR ── */
    .topbar {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 0 28px;
      height: 52px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .brand {
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.3px;
    }
    .brand span { color: var(--muted); font-weight: 400; }

    .divider { width: 1px; height: 22px; background: var(--border); }

    .server-pill {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
    }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--warn); transition: background .3s; }
    .dot.online { background: var(--green); box-shadow: 0 0 7px var(--green); }

    .tb-btns { display: flex; gap: 8px; margin-left: auto; }

    .btn {
      display: flex; align-items: center; gap: 5px;
      padding: 6px 16px;
      border-radius: 6px;
      font-size: 13px; font-weight: 600;
      font-family: 'JetBrains Mono', monospace;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all .2s;
    }
    .btn:disabled { opacity: .35; cursor: not-allowed; }

    .btn-run   { background: linear-gradient(135deg,#3fb950,#2ea043); color:#010409; border-color:#3fb950; }
    .btn-run:hover:not(:disabled)   { background: linear-gradient(135deg,#56d364,#3fb950); box-shadow: 0 0 18px rgba(63,185,80,.4); }

    .btn-build { background: var(--accent); color:#0d1117; border-color: var(--accent); }
    .btn-build:hover:not(:disabled) { background: #79baff; box-shadow: 0 0 16px rgba(88,166,255,.4); }

    .btn-sm {
      background: transparent; color: var(--muted);
      border-color: var(--border);
      padding: 6px 12px; font-size: 12px;
    }
    .btn-sm:hover:not(:disabled) { color: var(--text); border-color: var(--muted); background: var(--dim); }

    .btn-clear { color: var(--warn); }
    .btn-clear:hover:not(:disabled) { border-color: var(--warn); background: rgba(247,129,102,.08); }

    /* ── WORKSPACE ── */
    .workspace {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── EDITOR SIDE ── */
    .editor-side {
      width: 50%;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
    }

    .panel-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .panel-label {
      font-size: 11px; font-weight: 600; letter-spacing: .8px;
      text-transform: uppercase; color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
    }
    .file-badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--text);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 3px 10px;
    }
    .file-badge .live-dot {
      display: inline-block; width: 6px; height: 6px;
      border-radius: 50%; background: var(--green);
      margin-right: 6px; box-shadow: 0 0 5px var(--green);
    }

    .editor-wrap {
      flex: 1; display: flex; overflow: hidden; position: relative;
    }

    .line-nums {
      padding: 20px 0;
      min-width: 50px;
      text-align: right;
      padding-right: 14px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 15px;
      line-height: 26px;
      color: var(--muted);
      background: var(--dim);
      border-right: 1px solid var(--border);
      user-select: none;
      overflow: hidden;
      flex-shrink: 0;
      white-space: pre;
    }

    #code {
      flex: 1;
      padding: 20px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 15px;
      line-height: 26px;
      background: var(--bg);
      color: var(--text);
      border: none; outline: none; resize: none;
      tab-size: 4;
      white-space: pre;
      overflow: auto;
      caret-color: var(--accent);
    }

    /* ── OUTPUT SIDE ── */
    .output-side {
      width: 50%;
      display: flex;
      flex-direction: column;
      background: #010409;
    }

    .out-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 9px 18px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .term-dots { display: flex; gap: 6px; }
    .term-dots span { width: 11px; height: 11px; border-radius: 50%; }
    .term-dots .r { background: #ff5f56; }
    .term-dots .y { background: #ffbd2e; }
    .term-dots .g { background: #27c93f; }

    .out-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px; color: var(--muted);
    }
    .out-meta { display: flex; gap: 10px; }
    .meta-chip {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px; color: var(--muted);
      background: var(--dim); border: 1px solid var(--border);
      border-radius: 4px; padding: 2px 8px;
    }

    #output {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      line-height: 22px;
    }

    .out-line { display: flex; gap: 10px; padding: 1px 0; animation: fadeUp .15s ease; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:translateY(0); } }

    .prompt { color: var(--green); user-select: none; flex-shrink: 0; }
    .cmd    { color: var(--accent); }
    .ok     { color: var(--green); }
    .err    { color: var(--warn); }
    .info   { color: var(--yellow); }
    .dim    { color: var(--muted); }
    .out    { color: var(--text); white-space: pre-wrap; word-break: break-all; flex: 1; }

    .spin-line { display: flex; align-items: center; gap: 8px; }
    .spin { display: inline-block; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── STATUS BAR ── */
    .statusbar {
      display: flex; align-items: center; gap: 20px;
      padding: 6px 20px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px; color: var(--muted);
      flex-shrink: 0;
    }
    .sb-item { display: flex; align-items: center; gap: 5px; }
    .sb-val { color: var(--text); }
    .sb-val.ok  { color: var(--green); }
    .sb-val.err { color: var(--warn); }

    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="brand">TinyGo <span>/ live</span></div>
  <div class="divider"></div>
  <div class="server-pill">
    <div class="dot" id="statusDot"></div>
    <span id="statusText">connecting...</span>
  </div>

  <div class="tb-btns">
    <button class="btn btn-run" onclick="runCmd('run')">Run</button>
    <button class="btn btn-build" onclick="runCmd('build')">Build</button>
    <button class="btn btn-sm" onclick="runCmd('lex')">Lex</button>
    <button class="btn btn-sm" onclick="runCmd('parse')">Parse</button>
    <button class="btn btn-sm" onclick="runCmd('emit')">Emit C</button>
    <button class="btn btn-sm btn-clear" onclick="clearOut()">Clear</button>
  </div>
</div>

<!-- WORKSPACE -->
<div class="workspace">

  <!-- EDITOR -->
  <div class="editor-side">
    <div class="panel-bar">
      <div class="panel-label">Source</div>
      <div class="file-badge">
        <span class="live-dot"></span>main.go
      </div>
    </div>
    <div class="editor-wrap">
      <div class="line-nums" id="lineNums">1</div>
      <textarea id="code" spellcheck="false" autocorrect="off" autocapitalize="off"></textarea>
    </div>
  </div>

  <!-- OUTPUT -->
  <div class="output-side">
    <div class="out-bar">
      <div class="term-dots">
        <span class="r"></span><span class="y"></span><span class="g"></span>
      </div>
      <div class="out-title">tinygo — output</div>
      <div class="out-meta">
        <span class="meta-chip" id="metaStage">—</span>
        <span class="meta-chip" id="metaTime">0.000s</span>
      </div>
    </div>

    <div id="output"></div>

    <div class="statusbar">
      <div class="sb-item">runs: <span class="sb-val" id="sbRuns">0</span></div>
      <div class="sb-item">ok: <span class="sb-val ok" id="sbOk">0</span></div>
      <div class="sb-item">errors: <span class="sb-val err" id="sbErr">0</span></div>
      <div style="margin-left:auto;color:var(--accent)">TinyGo v0.1.0</div>
    </div>
  </div>

</div>

<script>
const SERVER = 'http://localhost:8080';
const out    = document.getElementById('output');
const code   = document.getElementById('code');
const lnums  = document.getElementById('lineNums');
let runs = 0, oks = 0, errs = 0, busy = false;

// ── DEFAULT CODE ─────────────────────────────────────────────────────────────
code.value = `package main

import "fmt"

func fibonacci(n int) int {
\tif n <= 1 {
\t\treturn n
\t}
\treturn fibonacci(n-1) + fibonacci(n-2)
}

func main() {
\tfor i := 0; i < 10; i++ {
\t\tfmt.Printf("fib(%d) = %d\\n", i, fibonacci(i))
\t}
}`;

// ── LINE NUMBERS ─────────────────────────────────────────────────────────────
function updateLineNums() {
  const n = code.value.split('\n').length;
  lnums.textContent = Array.from({length: n}, (_, i) => i + 1).join('\n');
  lnums.scrollTop = code.scrollTop;
}
code.addEventListener('input', updateLineNums);
code.addEventListener('scroll', () => { lnums.scrollTop = code.scrollTop; });
code.addEventListener('keydown', e => {
  if (e.key === 'Tab') {
    e.preventDefault();
    const s = code.selectionStart;
    code.value = code.value.slice(0, s) + '\t' + code.value.slice(code.selectionEnd);
    code.selectionStart = code.selectionEnd = s + 1;
    updateLineNums();
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') runCmd('build');
  if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'Enter') runCmd('run');
});
updateLineNums();

// ── OUTPUT HELPERS ────────────────────────────────────────────────────────────
function line(html) {
  const d = document.createElement('div');
  d.className = 'out-line';
  d.innerHTML = html;
  out.appendChild(d);
  out.scrollTop = out.scrollHeight;
  return d;
}
function prompt(cmd) {
  line(`<span class="prompt">tinygo $</span> <span class="cmd">${cmd}</span>`);
}
function text(t, cls = 'out') {
  if (!t) return;
  t.split('\n').forEach(l => line(`<span class="${cls}">${esc(l)}</span>`));
}
function sep(label) {
  line(`<span class="dim">── ${label} ${'─'.repeat(Math.max(0, 46 - label.length))}</span>`);
}
function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function clearOut() {
  out.innerHTML = '';
  document.getElementById('metaStage').textContent = '—';
  document.getElementById('metaTime').textContent = '0.000s';
}

// ── COMPILE ──────────────────────────────────────────────────────────────────
async function runCmd(cmd) {
  if (busy) return;
  busy = true;
  document.querySelectorAll('.btn').forEach(b => b.disabled = true);

  line('');
  sep(cmd.toUpperCase());
  prompt(`${cmd} main.go`);

  const spinDiv = line(`<span class="spin-line info"><span class="spin">◌</span> Compiling...</span>`);

  const start = performance.now();
  try {
    const res = await fetch(`${SERVER}/compile`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code: code.value, command: cmd }),
    });
    const elapsed = ((performance.now() - start) / 1000).toFixed(3);
    const resp = await res.json();
    spinDiv.remove();

    runs++;
    if (resp.success) {
      oks++;
      text(`✓ ${resp.stage || cmd} — OK`, 'ok');
      if (resp.output) text(resp.output, 'out');
      if (resp.binarySize)
        line(`<span class="dim">  binary: ${resp.binarySize}</span>`);
    } else {
      errs++;
      text(resp.output || 'compilation failed', 'err');
    }
    const t = resp.compileTime || `${elapsed}s`;
    line(`<span class="dim">  time: ${t}</span>`);
    document.getElementById('metaStage').textContent = resp.stage || cmd;
    document.getElementById('metaTime').textContent = t;
  } catch(e) {
    spinDiv.remove();
    errs++; runs++;
    text(`error: ${e.message} — is the server running?`, 'err');
  }

  document.getElementById('sbRuns').textContent = runs;
  document.getElementById('sbOk').textContent   = oks;
  document.getElementById('sbErr').textContent  = errs;
  busy = false;
  document.querySelectorAll('.btn').forEach(b => b.disabled = false);
}

// ── HEALTH CHECK ─────────────────────────────────────────────────────────────
async function ping() {
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusText');
  try {
    const r = await fetch(`${SERVER}/health`, { signal: AbortSignal.timeout(2000) });
    if (r.ok) { dot.classList.add('online'); txt.textContent = 'server online'; return; }
  } catch(_) {}
  dot.classList.remove('online');
  txt.textContent = 'server offline';
}
ping();
setInterval(ping, 5000);
</script>
</body>
</html>
